<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>RetailFlow Admin - Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="bg-gray-900 text-gray-100 flex h-screen overflow-hidden font-sans">

    <aside class="w-64 bg-gray-800 border-r border-gray-700 flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-700">
            <h1 class="text-xl font-bold text-blue-400"><i class="fas fa-robot mr-2"></i>RetailFlow <span
                    class="text-white">Admin</span></h1>
        </div>
        <nav class="flex-grow p-4 space-y-2">
            <a href="{% url 'admin_dashboard' %}"
                class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white rounded transition"><i
                    class="fas fa-tachometer-alt w-6"></i> Dashboard</a>
            <a href="{% url 'admin_inventory' %}"
                class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white rounded transition"><i
                    class="fas fa-boxes w-6"></i> Inventory & AI</a>
            <a href="{% url 'admin_suppliers' %}"
                class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white rounded transition"><i
                    class="fas fa-truck w-6"></i> Suppliers</a>
            <a href="{% url 'admin_accounting' %}"
                class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white rounded transition"><i
                    class="fas fa-file-invoice-dollar w-6"></i> Accounting & OCR</a>
            <a href="{% url 'admin_reports' %}"
                class="block px-4 py-2 text-gray-400 hover:bg-gray-700 hover:text-white rounded transition"><i
                    class="fas fa-chart-line w-6"></i> Reports</a>
            <a href="{% url 'admin_settings' %}" class="block px-4 py-2 bg-blue-600 text-white rounded transition"><i
                    class="fas fa-cog w-6"></i> Settings</a>
        </nav>
        <div class="p-4 border-t border-gray-700">
            <a href="{% url 'home' %}" class="text-sm text-gray-400 hover:text-white"><i
                    class="fas fa-external-link-alt mr-1"></i> View Storefront</a>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-y-auto">
        <header class="h-16 bg-gray-800 border-b border-gray-700 flex items-center justify-between px-8">
            <h2 class="text-xl font-semibold">System Configuration</h2>
            <button class="bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded transition shadow">
                Save Changes
            </button>
        </header>

        <div class="p-8 max-w-4xl space-y-8">

            <div class="bg-gray-800 rounded-lg border border-gray-700 shadow-lg p-6">
                <h3 class="font-semibold text-lg mb-4 border-b border-gray-700 pb-2"><i
                        class="fas fa-network-wired text-blue-400 mr-2"></i> Automation Engine (n8n)</h3>
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Global Base Webhook URL</label>
                        <input type="text" value="http://localhost:5678/webhook-test/"
                            class="w-full bg-gray-700 text-white border border-gray-600 rounded p-2 focus:outline-none focus:border-blue-500 font-mono text-sm">
                    </div>
                    <div class="flex items-center mt-2">
                        <input type="checkbox" checked
                            class="w-4 h-4 text-blue-600 bg-gray-700 border-gray-600 rounded focus:ring-blue-500">
                        <label class="ml-2 text-sm text-gray-300">Enable live agent triggering from dashboard</label>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 rounded-lg border border-gray-700 shadow-lg p-6">
                <h3 class="font-semibold text-lg mb-4 border-b border-gray-700 pb-2"><i
                        class="fab fa-whatsapp text-green-400 mr-2"></i> Smart Interface Alerts</h3>
                <p class="text-sm text-gray-400 mb-4">Configure the phone number that will receive AI anomaly alerts and
                    low-stock warnings.</p>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Manager Phone Number</label>
                        <input type="text" placeholder="+880 1XXXXXXXXX"
                            class="w-full bg-gray-700 text-white border border-gray-600 rounded p-2 focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">WhatsApp Business API Key</label>
                        <input type="password" placeholder="••••••••••••••••"
                            class="w-full bg-gray-700 text-white border border-gray-600 rounded p-2 focus:outline-none focus:border-blue-500">
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 rounded-lg border border-gray-700 shadow-lg p-6">
                <h3 class="font-semibold text-lg mb-4 border-b border-gray-700 pb-2"><i
                        class="fas fa-database text-purple-400 mr-2"></i> Audit & Backup System</h3>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm text-gray-400 mb-1">Automated Database Backup Frequency</label>
                        <select
                            class="w-full bg-gray-700 text-white border border-gray-600 rounded p-2 focus:outline-none focus:border-blue-500">
                            <option>Every 12 Hours</option>
                            <option selected>Daily (Midnight)</option>
                            <option>Weekly</option>
                        </select>
                    </div>
                    <div class="flex flex-col justify-end">
                        <button
                            class="bg-gray-700 hover:bg-gray-600 border border-gray-500 text-white px-4 py-2 rounded transition flex justify-center items-center">
                            <i class="fas fa-cloud-download-alt mr-2"></i> Download Manual Backup (.sql)
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

</body>

</html>
